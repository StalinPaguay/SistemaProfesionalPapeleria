<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
      <span class="text-blue-600">Paper</span>DS
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Sistema de Gestión Profesional
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-xl sm:px-10 border border-gray-100">
      <form class="space-y-6" (ngSubmit)="login()">
        
        <div *ngIf="error" class="alert alert-error mb-4">
          <span class="material-icons-outlined">error</span>
          <span>{{ error }}</span>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">
            Correo Electrónico
          </label>
          <div class="mt-1">
            <input id="email" name="email" type="email" autocomplete="email" required [(ngModel)]="credentials.correo"
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">
            Contraseña
          </label>
          <div class="mt-1">
            <input id="password" name="password" type="password" autocomplete="current-password" required [(ngModel)]="credentials.password"
                   class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors">
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loading || !credentials.correo || !credentials.password"
                  class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 transition-colors">
            <span *ngIf="!loading">Iniciar Sesión</span>
            <span *ngIf="loading" class="material-icons-outlined animate-spin">autorenew</span>
          </button>
        </div>
        
        <div class="text-center mt-4 text-sm text-gray-600">
          ¿No tienes una cuenta? <a routerLink="/register" class="font-medium text-blue-600 hover:text-blue-500">Regístrate aquí</a>
        </div>
      </form>
    </div>
  </div>
</div>
